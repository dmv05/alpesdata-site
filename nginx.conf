server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ =404;
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
    }

    # API proxy vers le backend contact
    location /api/ {
        proxy_pass http://alpesdata-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Redirections 301 anciennes URLs Hostinger → nouvelles (sans équivalent .html direct)
    location = /blog-list { return 301 https://$host/blog.html; }
    location = /nuki-smartlock-20-avec-bridge-serrure-connectee { return 301 https://$host/nuki.html; }
    location = /nuki-smartlock-pro-40-serrure-connectee { return 301 https://$host/nuki.html; }
    location = /page { return 301 https://$host/store.html; }
    location ~ ^/blog/ { return 301 https://$host/blog.html; }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|css|js|xml|txt)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
