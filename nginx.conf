server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ =404;
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
    }

    # 301 redirections anciennes URLs Hostinger → nouvelles URLs
    location = /contact { return 301 /contact.html; }
    location = /calendrier { return 301 /calendrier.html; }
    location = /blog-list { return 301 /blog.html; }
    location = /nuki-smartlock-20-avec-bridge-serrure-connectee { return 301 /nuki.html; }
    location = /nuki-smartlock-pro-40-serrure-connectee { return 301 /nuki.html; }
    location = /page { return 301 /store.html; }
    location ~ ^/blog/ { return 301 /blog.html; }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|css|js|xml|txt)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
